<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Task List</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css" />

    <!-- FONT -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- ICON -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
  </head>

  <body>
    <!-- TASK LIST -->
    <div class="container">
      <div class="top">
        <h1>Task List</h1>

        <button class="add-btn">
          <i class="fa-solid fa-plus"></i>
          Add Task
        </button>
      </div>

      <!-- CARD 1 -->
      <div class="task-card">
        <div class="task-info">
          <div class="task-title">
            <small>Task</small>
            <h3>Go to gym</h3>
          </div>

          <div class="priority">
            <small>Priority</small>
            <p class="high">High</p>
          </div>

          <div class="status">To Do</div>
        </div>

        <div class="actions">
          <div class="circle"></div>

          <i class="fa-regular fa-pen-to-square edit"></i>

          <i class="fa-regular fa-trash-can delete"></i>
        </div>
      </div>

      <!-- CARD 2 -->
      <div class="task-card">
        <div class="task-info">
          <div class="task-title">
            <small>Task</small>
            <h3>Read a book</h3>
          </div>

          <div class="priority">
            <small>Priority</small>
            <p class="low">Low</p>
          </div>

          <div class="status">Done</div>
        </div>

        <div class="actions">
          <div class="circle"></div>

          <i class="fa-regular fa-pen-to-square edit"></i>

          <i class="fa-regular fa-trash-can delete"></i>
        </div>
      </div>

      <!-- CARD 3 -->
      <div class="task-card">
        <div class="task-info">
          <div class="task-title">
            <small>Task</small>
            <h3>Go to market</h3>
          </div>

          <div class="priority">
            <small>Priority</small>
            <p class="medium">Medium</p>
          </div>

          <div class="status">In Progress</div>
        </div>

        <div class="actions">
          <div class="circle"></div>

          <i class="fa-regular fa-pen-to-square edit"></i>

          <i class="fa-regular fa-trash-can delete"></i>
        </div>
      </div>
    </div>

    <!-- FORM -->
    <div class="form-box">
      <h2>Add Task</h2>

      <div class="close">×</div>

      <div class="form-group">
        <label>Task</label>

        <input type="text" placeholder="Type your task here..." />
      </div>

      <div class="form-group">
        <label>Priority</label>

        <div class="priority-buttons">
          <button class="btn-high">High</button>

          <button class="btn-medium">Medium</button>

          <button class="btn-low">Low</button>
        </div>
      </div>

      <div class="form-footer">
        <button class="submit-btn">Add</button>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
